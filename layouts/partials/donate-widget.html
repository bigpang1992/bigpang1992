<!-- Floating Donate Button -->
<button class="donate-float-btn btn-donate-trigger fixed bottom-8 right-8 z-[999] w-14 h-14 rounded-full bg-gradient-to-r from-neon-pink to-neon-gold text-white text-xl flex items-center justify-center shadow-[0_0_20px_rgba(255,0,110,0.3)] hover:shadow-[0_0_30px_rgba(255,0,110,0.5)] hover:scale-110 transition-all cursor-pointer" id="donate-float-btn" aria-label="打赏">
  <span class="donate-float-icon">💰</span>
  <span class="donate-float-pulse"></span>
</button>

<!-- Donate Modal -->
<div class="donate-modal fixed inset-0 z-[9999] hidden" id="donate-modal">
  <div class="donate-modal-overlay absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
  <div class="donate-modal-content relative z-10 w-[90vw] max-w-md mx-auto mt-[10vh] rounded-2xl bg-dark-alt border border-white/10 p-6 shadow-[0_0_60px_rgba(0,212,255,0.1)]">
    <button class="donate-modal-close absolute top-4 right-4 w-8 h-8 rounded-full bg-white/5 text-slate-400 hover:text-white hover:bg-white/10 transition-all flex items-center justify-center text-lg" id="donate-modal-close">&times;</button>

    <div class="text-center mb-4">
      <h2 class="text-lg font-bold text-white">{{ .Site.Params.donate.title }}</h2>
      <p class="text-sm text-slate-400">{{ .Site.Params.donate.subtitle }}</p>
    </div>

    <div class="donate-modal-flattery text-center mb-4" id="donate-flattery">
      <p class="flattery-text text-sm text-neon-gold">您的慷慨让世界更美好！✨</p>
    </div>

    <div class="donate-modal-tabs flex gap-2 mb-4">
      <button class="donate-tab active flex-1 py-2.5 rounded-xl text-sm font-semibold border border-white/10 text-slate-300 transition-all data-[active]:bg-cyber/10 data-[active]:border-cyber/30 data-[active]:text-cyber" data-tab="wechat">
        <span>💚</span> 微信
      </button>
      <button class="donate-tab flex-1 py-2.5 rounded-xl text-sm font-semibold border border-white/10 text-slate-300 transition-all" data-tab="alipay">
        <span>💙</span> 支付宝
      </button>
    </div>

    <div class="donate-modal-qr flex justify-center">
      <div class="qr-container w-52 h-52 rounded-xl bg-white p-2" id="qr-wechat">
        <img src="{{ .Site.Params.donate.wechatQR }}" alt="微信打赏二维码" class="w-full h-full object-contain"
             onerror="this.parentElement.innerHTML='<div class=qr-placeholder>请在 hugo.toml 中配置<br>微信收款码图片路径</div>'">
      </div>
      <div class="qr-container w-52 h-52 rounded-xl bg-white p-2" id="qr-alipay" style="display:none">
        <img src="{{ .Site.Params.donate.alipayQR }}" alt="支付宝打赏二维码" class="w-full h-full object-contain"
             onerror="this.parentElement.innerHTML='<div class=qr-placeholder>请在 hugo.toml 中配置<br>支付宝收款码图片路径</div>'">
      </div>
    </div>

    <p class="text-center text-xs text-slate-500 mt-4">扫描二维码，向赛博乞丐投喂 🙏</p>

    <!-- Confetti canvas -->
    <canvas id="confetti-canvas" class="confetti-canvas absolute inset-0 pointer-events-none"></canvas>
  </div>
</div>

<script>
// Flattery messages from Hugo config
window.FLATTERY_MESSAGES = [
  {{ range .Site.Params.donate.messages }}
  {{ . | jsonify }},
  {{ end }}
];
</script>
