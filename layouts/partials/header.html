<header class="site-header" id="site-header">
  <nav class="nav-container">
    <a href="{{ "/" | relURL }}" class="nav-logo">
      <img src="{{ "images/logo.svg" | relURL }}" alt="{{ .Site.Title }}" class="nav-logo-img">
    </a>

    <ul class="nav-menu" id="nav-menu">
      {{ range .Site.Menus.main }}
      <li class="nav-item">
        <a href="{{ .URL | relURL }}" class="nav-link {{ if $.IsMenuCurrent "main" . }}active{{ end }}">
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>

    <button class="nav-toggle" id="nav-toggle" aria-label="菜单">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>
</header>
