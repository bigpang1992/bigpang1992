<article class="group" data-scroll-reveal itemscope itemtype="https://schema.org/BlogPosting">
  <a href="{{ .RelPermalink }}" class="block rounded-2xl bg-white/[0.03] border border-white/[0.08] backdrop-blur-xl overflow-hidden hover:border-cyber/30 hover:-translate-y-1.5 hover:shadow-[0_8px_40px_rgba(0,212,255,0.08)] transition-all duration-300" aria-label="阅读：{{ .Title }}">
    <!-- Cover -->
    <div class="relative h-48 overflow-hidden">
      {{ with .Params.cover }}
      <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy" itemprop="image" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
      {{ else }}
      <div class="w-full h-full bg-gradient-to-br from-dark-alt to-dark flex items-center justify-center">
        <span class="text-5xl opacity-30">📝</span>
      </div>
      {{ end }}
      <div class="absolute inset-0 bg-gradient-to-t from-dark via-transparent to-transparent opacity-60"></div>
    </div>
    <!-- Body -->
    <div class="p-5">
      <div class="flex items-center gap-3 mb-3">
        <time class="text-xs text-slate-500 font-mono" datetime="{{ .Date.Format "2006-01-02" }}" itemprop="datePublished">{{ .Date.Format "2006-01-02" }}</time>
        {{ range first 1 .Params.categories }}
        <span class="text-xs px-2 py-0.5 rounded bg-cyber/10 text-cyber font-medium" itemprop="articleSection">{{ . }}</span>
        {{ end }}
      </div>
      <h3 class="text-white font-bold text-[15px] leading-snug mb-2 line-clamp-2 group-hover:text-cyber transition-colors" itemprop="headline">{{ .Title }}</h3>
      <p class="text-slate-400 text-sm leading-relaxed line-clamp-2 mb-4" itemprop="description">{{ .Summary | plainify | truncate 120 }}</p>
      <div class="flex items-center justify-between text-xs text-slate-500">
        <span>⏱ {{ .ReadingTime }} 分钟</span>
        <span class="text-cyber/60 group-hover:text-cyber transition-colors">阅读更多 →</span>
      </div>
    </div>
  </a>
</article>
