<article class="article-card" data-scroll-reveal itemscope itemtype="https://schema.org/BlogPosting">
  <a href="{{ .RelPermalink }}" class="card-link" aria-label="阅读：{{ .Title }}">
    <div class="card-cover">
      {{ with .Params.cover }}
      <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy" itemprop="image">
      {{ else }}
      <div class="card-cover-default">
        <span class="card-cover-icon">📝</span>
      </div>
      {{ end }}
      <div class="card-cover-overlay"></div>
    </div>
    <div class="card-body">
      <div class="card-meta">
        <time class="card-date" datetime="{{ .Date.Format "2006-01-02" }}" itemprop="datePublished">{{ .Date.Format "2006-01-02" }}</time>
        {{ range first 1 .Params.categories }}
        <span class="card-category" itemprop="articleSection">{{ . }}</span>
        {{ end }}
      </div>
      <h3 class="card-title" itemprop="headline">{{ .Title }}</h3>
      <p class="card-excerpt" itemprop="description">{{ .Summary | plainify | truncate 120 }}</p>
      <div class="card-footer">
        <span class="card-readtime">⏱ {{ .ReadingTime }} 分钟</span>
        <span class="card-readmore">阅读更多 →</span>
      </div>
    </div>
  </a>
</article>
