<article class="article-card" data-scroll-reveal>
  <a href="{{ .RelPermalink }}" class="card-link">
    <div class="card-cover">
      {{ with .Params.cover }}
      <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy">
      {{ else }}
      <div class="card-cover-default">
        <span class="card-cover-icon">📝</span>
      </div>
      {{ end }}
      <div class="card-cover-overlay"></div>
    </div>
    <div class="card-body">
      <div class="card-meta">
        <time class="card-date">{{ .Date.Format "2006-01-02" }}</time>
        {{ range first 1 .Params.categories }}
        <span class="card-category">{{ . }}</span>
        {{ end }}
      </div>
      <h3 class="card-title">{{ .Title }}</h3>
      <p class="card-excerpt">{{ .Summary | plainify | truncate 120 }}</p>
      <div class="card-footer">
        <span class="card-readtime">⏱ {{ .ReadingTime }} 分钟</span>
        <span class="card-readmore">阅读更多 →</span>
      </div>
    </div>
  </a>
</article>
