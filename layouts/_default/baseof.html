<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  {{- partial "head.html" . -}}
</head>
<body class="bg-[#07070f] text-slate-300 font-body leading-relaxed overflow-x-hidden min-h-screen antialiased">
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loader">
      <div class="loader-icon">💸</div>
      <div class="loader-text"><img src="{{ "images/logo.png" | relURL }}" alt="{{ .Site.Title }}" class="h-12 w-auto"></div>
      <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>
  </div>

  <!-- Animated Mesh Gradient Background -->
  <div class="mesh-gradient"></div>
  <div class="mesh-orb-pink"></div>

  <!-- Cyber Grid Overlay -->
  <div class="cyber-grid"></div>

  <!-- Particle Background -->
  <canvas id="particles-canvas"></canvas>

  {{- partial "header.html" . -}}

  <main class="relative z-10">
    {{- block "main" . }}{{- end }}
  </main>

  {{- partial "footer.html" . -}}

  {{- if .Site.Params.donate.enabled }}
    {{- partial "donate-widget.html" . -}}
  {{- end }}

  <!-- Back to Top -->
  <button id="back-to-top" class="back-to-top" aria-label="回到顶部">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <script src="{{ "js/particles.js" | relURL }}"></script>
  <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
