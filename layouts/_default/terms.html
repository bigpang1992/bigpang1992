{{ define "main" }}

<section class="relative pt-28 pb-20 overflow-hidden">
  <div class="absolute inset-0 bg-gradient-to-b from-neon-violet/[0.04] via-cyber/[0.02] to-transparent"></div>
  <div class="relative max-w-[1200px] mx-auto px-6 text-center">
    <h1 class="text-4xl md:text-5xl font-black gradient-text mb-4">{{ .Title }}</h1>
    <p class="text-slate-500 text-lg">共 {{ len .Data.Terms }} 个{{ if eq .Data.Plural "categories" }}分类{{ else }}标签{{ end }}</p>
  </div>
</section>

<section class="pb-24 relative z-10">
  <div class="max-w-[1200px] mx-auto px-6">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-5">
      {{ range .Data.Terms.Alphabetical }}
      <a href="{{ .Page.RelPermalink }}" class="cat-card group relative rounded-2xl bg-gradient-to-b from-white/[0.04] to-white/[0.01] border border-white/[0.07] backdrop-blur-xl p-7 text-center" style="--glow-color: rgba(0,212,255,0.12)" data-scroll-reveal>
        <h3 class="text-white font-bold text-base mb-2 group-hover:text-cyber transition-colors duration-300">{{ .Page.Title }}</h3>
        <span class="text-sm text-slate-500 font-mono">{{ .Count }} 篇文章</span>
      </a>
      {{ end }}
    </div>
  </div>
</section>

{{ end }}
